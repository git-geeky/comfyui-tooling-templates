name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m unittest discover -s tests
      - run: python scripts/qwen_structured_prompt.py --template architecture-wood-joinery --templates templates/qwen_structured_templates.json
      - run: python scripts/workflow_catalog.py --input examples/workflow-catalog.json
